# Font
font_family      JetBrains Mono Nerd Font
font_size        12.0

# Window Layout
window_padding_width 15
confirm_os_window_close 0

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# URL Handling
detect_urls yes
url_style curly

# ================================================================
# Catppuccin Mocha Theme
# ================================================================

# Special
foreground              #CDD6F4
background              #1E1E2E
selection_foreground     #1E1E2E
selection_background     #F5E0DC
background_opacity       0.85

# Cursor
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL color
url_color               #F5E0DC

# Tabs
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# 16-color palette
# Black
color0 #45475A
color8 #585B70

# Red
color1 #F38BA8
color9 #F38BA8

# Green
color2  #A6E3A1
color10 #A6E3A1

# Yellow
color3  #F9E2AF
color11 #F9E2AF

# Blue
color4  #89B4FA
color12 #89B4FA

# Magenta
color5  #F5C2E7
color13 #F5C2E7

# Cyan
color6  #94E2D5
color14 #94E2D5

# White
color7  #BAC2DE
color15 #A6ADC8
