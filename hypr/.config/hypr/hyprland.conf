# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = kitty yazi
$menu = hyprlauncher

#################
### AUTOSTART ###
#################
exec-once = ~/.config/quickshell/start-quickshell.sh
exec-once = hyprpaper
exec-once = ~/.config/hypr/scripts/walt-restore.sh
exec-once = arbtt-capture
exec-once = avizod
exec-once = hypridle

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WLR_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1:/dev/dri/card2

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(313244aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 4
        passes = 3
        new_optimizations = true
        vibrancy = 0.2
    }
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
    disable_splash_rendering = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 
    touchpad {
        natural_scroll = false
    }
}

cursor {
    inactive_timeout = 3
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# --- RESIZING ---
binde = $mainMod ALT, right, resizeactive, 30 0
binde = $mainMod ALT, left, resizeactive, -30 0
binde = $mainMod ALT, up, resizeactive, 0 -30
binde = $mainMod ALT, down, resizeactive, 0 30

# --- APPS & ACTIONS ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, U, exec, $menu
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, layoutmsg, togglesplit 
bind = $mainMod, B, exec, google-chrome-stable
bind = $mainMod SHIFT, B, exec, microsoft-edge-canary
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, W, exec, kitty --class walt-float --hold -e walt
bind = $mainMod, Escape, exec, hyprlock

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# System Commands
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, exec, ~/.config/quickshell/take-screenshot.sh region
bind = $mainMod SHIFT, T, exec, ~/.config/quickshell/toggle-bar-background.sh
bind = , Print, exec, ~/.config/quickshell/take-screenshot.sh output

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, volumectl toggle-mute
binde = , XF86MonBrightnessUp, exec, lightctl up
binde = , XF86MonBrightnessDown, exec, lightctl down

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    no_focus = true
}

windowrule {
    name = walt-picker
    match:class = walt-float
    float = yes
    size = 1000 700
}