; Hyprlock-inspired configuration for SilentSDDM

[General]
scale = 1.2
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = "dynamic_wallpaper.jpg"
use-background-color = false
background-color = "#1e1e2e"
blur = 0
brightness = 0.0
saturation = 0.0

[LockScreen.Clock]
display = true
position = "center"
align = "center"
format = "hh:mm"
font-family = "RedHatDisplay"
font-size = 200
font-weight = 900
color = "#EECBAF"

[LockScreen.Date]
display = true
format = "dddd, MMMM dd, yyyy"
locale = "en_US"
font-family = "RedHatDisplay"
font-size = 14
font-weight = 600
color = "#EECBAF"
margin-top = -15

[LockScreen.Message]
display = false
position = "bottom-center"

[LoginScreen]
background = "dynamic_wallpaper.jpg"
use-background-color = false
background-color = "#1e1e2e"
blur = 0
brightness = 0.0
saturation = 0.0

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 120
inactive-size = 80
inactive-opacity = 0.35
active-border-size = 2
inactive-border-size = 0
active-border-color = "#EECBAF"
inactive-border-color = "#EECBAF"

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 16
font-weight = 700
color = "#FFFFFF"
margin = 10

[LoginScreen.LoginArea.PasswordInput]
width = 350
height = 50
display-icon = false
font-family = "RedHatDisplay"
font-size = 14
icon = "password.svg"
icon-size = 16
content-color = "#FFFFFF"
background-color = "#141414"
background-opacity = 0.6
border-size = 2
border-color = "#EECBAF"
border-radius-left = 10
border-radius-right = 10
margin-top = 10
masked-character = "*"

[LoginScreen.LoginArea.LoginButton]
background-color = "#141414"
background-opacity = 0.6
active-background-color = "#EECBAF"
active-background-opacity = 1.0
icon = "arrow-right.svg"
icon-size = 18
content-color = "#EECBAF"
active-content-color = "#141414"
border-size = 2
border-color = "#EECBAF"
border-radius-left = 10
border-radius-right = 10
margin-left = 5
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "RedHatDisplay"
font-size = 14
font-weight = 600

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Logging in"
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 30
icon = "spinner.svg"
color = "#EECBAF"
spacing = 5

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 11
font-weight = 400
normal-color = "#FFFFFF"
warning-color = "#EECBAF"
error-color = "#f38ba8"
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 50
margin-right = 50
margin-bottom = 50
margin-left = 50
size = 30
border-radius = 10
spacing = 10
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 30
item-spacing = 2
padding = 5
display-scrollbar = true
margin = 5
background-color = "#141414"
background-opacity = 0.8
active-option-background-color = "#EECBAF"
active-option-background-opacity = 0.3
content-color = "#FFFFFF"
active-content-color = "#FFFFFF"
font-family = "RedHatDisplay"
border-size = 0
border-color = "#EECBAF"
font-size = 11
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-left"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = true
button-width = 200
popup-width = 200
background-color = "#141414"
background-opacity = 0.0
active-background-opacity = 0.3
content-color = "#FFFFFF"
active-content-color = "#FFFFFF"
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-right"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = true
background-color = "#141414"
background-opacity = 0.0
active-background-opacity = 0.3
content-color = "#FFFFFF"
active-content-color = "#FFFFFF"
border-size = 0
font-size = 10
icon = "language.svg"
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-right"
index = 0
background-color = "#141414"
background-opacity = 0.0
active-background-opacity = 0.3
content-color = "#FFFFFF"
active-content-color = "#FFFFFF"
border-size = 0
icon = "keyboard.svg"
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-right"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#141414"
background-opacity = 0.0
active-background-opacity = 0.3
content-color = "#FFFFFF"
active-content-color = "#FFFFFF"
border-size = 0
icon = "power.svg"
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#141414"
background-opacity = 0.8
key-content-color = "#FFFFFF"
key-color = "#FFFFFF"
key-opacity = 0.15
key-active-background-color = "#EECBAF"
key-active-opacity = 0.3
selection-background-color = "#EECBAF"
selection-content-color = "#141414"
primary-color = "#EECBAF"
border-size = 0
border-color = "#000000"
restrict-input = "none"

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 11
content-color = "#FFFFFF"
background-color = "#141414"
background-opacity = 0.8
border-radius = 5
disable-user = false
disable-login-button = false
